# Produção no DigitalOcean Droplet: Postgres + Redis + API + Web + Caddy (SSL automático).
# Copie .env.droplet.example para .env e ajuste os domínios/segredos.
services:
  postgres:
    image: postgres:16-alpine
    container_name: uc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-unicorp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-unicorp}
    volumes:
      - uc_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-unicorp}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: uc_redis
    restart: unless-stopped
    volumes:
      - uc_redisdata:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: uc_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      PORT: 3333
      API_CORS_ORIGIN: ${WEB_ORIGIN}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
    volumes:
      - uc_uploads:/repo/apps/api/uploads

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${API_PUBLIC_URL}
    container_name: uc_web
    restart: unless-stopped
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    container_name: uc_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - uc_caddydata:/data
      - uc_caddyconfig:/config
    depends_on:
      - api
      - web

volumes:
  uc_pgdata:
  uc_redisdata:
  uc_uploads:
  uc_caddydata:
  uc_caddyconfig:
